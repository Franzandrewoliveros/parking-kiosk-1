<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Metro Plaza Management - Bluetooth Printing</title>
    <style>
        :root { 
            --red-main: #d32f2f; --red-dark: #b71c1c; --dark-bg: #1a1a1a; 
            --glass: rgba(255, 255, 255, 0.98);
        }
        
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #eee; height: 100vh; display: flex; overflow: hidden; }

        /* LOGIN OVERLAY */
        .parking-bg {
            position: fixed; inset: 0; z-index: 2500;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1590674899484-d5640e854abe?q=80&w=2000');
            background-size: cover; background-position: center;
            display: flex; justify-content: center; align-items: center;
        }

        .glass-card { 
            background: var(--glass); padding: 40px; border-radius: 20px; 
            width: 380px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border-top: 5px solid var(--red-main);
        }

        .input-group { position: relative; width: 100%; margin-bottom: 15px; }
        
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; outline: none; }

        .toggle-password { position: absolute; right: 10px; top: 12px; cursor: pointer; color: #666; font-size: 0.8rem; }

        /* SIDEBAR */
        #sidebar { width: 280px; background: var(--dark-bg); color: white; display: none; flex-direction: column; }
        .sidebar-brand { padding: 30px; background: var(--red-main); text-align: center; }
        .nav-item { padding: 18px 25px; cursor: pointer; border-bottom: 1px solid #2a2a2a; color: #aaa; }
        .nav-item.active { background: #2a2a2a; color: white; border-left: 5px solid var(--red-main); }

        #main-content { flex-grow: 1; padding: 40px; overflow-y: auto; display: none; }
        
        .btn-main { width:100%; padding:15px; background:var(--red-main); color:white; border:none; border-radius:10px; cursor:pointer; font-weight:bold; }
        .btn-print { background: #444; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; margin-bottom: 10px; width: 100%; }
        
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        
        .status-tag { padding: 5px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }
        .status-online { background: #e8f5e9; color: #2e7d32; }
    </style>
</head>
<body>

<div id="login-overlay" class="parking-bg">
    <div class="glass-card">
        <h1 style="color:var(--red-main);">METRO PLAZA</h1>
        <div class="input-group"><input type="email" id="login-email" placeholder="admin@metro.ph"></div>
        <div class="input-group">
            <input type="password" id="login-pass" placeholder="Password">
            <span class="toggle-password" onclick="togglePass()">👁️ Show</span>
        </div>
        <button onclick="handleLogin()" class="btn-main">SIGN IN</button>
        <p><a href="#" onclick="triggerReset()" style="color: #666; font-size: 0.8rem;">Forgot Password?</a></p>
    </div>
</div>

<div id="sidebar">
    <div class="sidebar-brand"><h2>MANAGEMENT</h2><small id="role-display"></small></div>
    <div class="nav-item active" onclick="showTab('dash', this)">🔴 DASHBOARD</div>
    <div class="nav-item" onclick="showTab('hist', this)">📂 HISTORY</div>
    <div class="nav-item admin-only" onclick="showTab('sale', this)">💰 SALES</div>
    <div class="nav-item" onclick="logout()" style="margin-top:auto; background:#b71c1c;">LOGOUT</div>
</div>

<div id="main-content">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h2>Parking Dashboard</h2>
        <button class="btn-print" id="btn-connect" style="width: auto; padding: 10px 20px;">🔌 CONNECT PRINTER</button>
    </div>
    
    <div id="printer-status" style="margin-bottom: 20px;">
        <span class="status-tag" id="status-text">Printer Disconnected</span>
    </div>

    <div id="dash" class="tab-view">
        <table>
            <thead><tr><th>PLATE</th><th>IN</th><th>ACTION</th></tr></thead>
            <tbody id="active-list"></tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, doc, deleteDoc, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDecxXNg2dcSM0rCPN_avxapxCXHfxXOSw",
        authDomain: "metroplaza-13b5e.firebaseapp.com",
        projectId: "metroplaza-13b5e",
        storageBucket: "metroplaza-13b5e.firebasestorage.app",
        messagingSenderId: "958136196486",
        appId: "1:958136196486:web:28292dcd6cd5f2bbfae007"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let printCharacteristic;

    // --- BLUETOOTH PRINTER LOGIC ---
    document.getElementById('btn-connect').addEventListener('click', async () => {
        try {
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ services: ['000018f0-0000-1000-8000-00805f9b34fb'] }]
            });
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService('000018f0-0000-1000-8000-00805f9b34fb');
            printCharacteristic = await service.getCharacteristic('00002af1-0000-1000-8000-00805f9b34fb');
            
            document.getElementById('status-text').innerText = "Printer Connected: " + device.name;
            document.getElementById('status-text').className = "status-tag status-online";
        } catch (e) { alert("Bluetooth Error: " + e.message); }
    });

    async function printReceipt(data) {
        if (!printCharacteristic) {
            alert("Printer not connected! Using browser print instead.");
            window.print();
            return;
        }

        const encoder = new TextEncoder();
        const esc = '\x1B';
        const commands = [
            '\x1B\x40',          // Initialize
            '\x1B\x61\x01',      // Center align
            'METRO PLAZA\n',
            'Bagong Silang Branch\n',
            '--------------------------------\n',
            '\x1B\x61\x00',      // Left align
            `Plate: ${data.plate}\n`,
            `Time In: ${data.entryTime}\n`,
            `Time Out: ${new Date().toLocaleTimeString()}\n`,
            `Total Fee: P20.00\n`,
            '--------------------------------\n',
            '\x1B\x61\x01',      // Center
            'Thank you for parking!\n\n\n\n'
        ];

        for (const cmd of commands) {
            await printCharacteristic.writeValue(encoder.encode(cmd));
        }
    }

    // --- AUTH & DATA LOGIC ---
    window.handleLogin = async () => {
        const e = document.getElementById('login-email').value;
        const p = document.getElementById('login-pass').value;
        try { await signInWithEmailAndPassword(auth, e, p); } 
        catch (err) { alert("Invalid login."); }
    };

    onAuthStateChanged(auth, user => {
        const isAuth = !!user;
        document.getElementById('login-overlay').style.display = isAuth ? 'none' : 'flex';
        document.getElementById('sidebar').style.display = isAuth ? 'flex' : 'none';
        document.getElementById('main-content').style.display = isAuth ? 'block' : 'none';
        if(user) {
            const isAdmin = user.email === "admin@metro.ph";
            document.querySelectorAll('.admin-only').forEach(el => el.style.display = isAdmin ? 'block' : 'none');
            document.getElementById('role-display').innerText = isAdmin ? "🔑 ADMIN" : "🛡️ GUARD";
        }
    });

    onSnapshot(collection(db, "active_parking"), snap => {
        document.getElementById('active-list').innerHTML = snap.docs.map(d => {
            const r = d.data();
            return `<tr>
                <td><b>${r.plate}</b></td>
                <td>${r.entryTime}</td>
                <td><button class="btn-main" onclick="releaseCar('${d.id}', '${r.plate}', '${r.entryTime}')">RELEASE & PRINT</button></td>
            </tr>`;
        }).join('');
    });

    window.releaseCar = async (id, plate, timeIn) => {
        if(confirm(`Release ${plate}?`)) {
            const data = { plate, entryTime: timeIn, fee: "P20.00" };
            await printReceipt(data); // TRIGGER BLUETOOTH PRINT
            await deleteDoc(doc(db, "active_parking", id));
            await addDoc(collection(db, "parking_history"), data);
        }
    };

    window.logout = () => signOut(auth);
    window.togglePass = () => {
        const p = document.getElementById('login-pass');
        p.type = p.type === 'password' ? 'text' : 'password';
    };
    window.showTab = (id, el) => {
        document.querySelectorAll('.tab-view').forEach(v => v.style.display = 'none');
        document.getElementById(id).style.display = 'block';
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
    };
</script>
</body>
</html>
