<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Metro Plaza Bagong Silang - Management System</title>
    <style>
        :root { 
            --red-main: #d32f2f; --red-dark: #b71c1c; --dark-bg: #1a1a1a; 
            --glass: rgba(255, 255, 255, 0.98); --text-light: #f5f5f5;
            --green-guard: #2e7d32; --blue-archive: #1976d2;
        }
        
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #eee; height: 100vh; display: flex; overflow: hidden; }

        /* LOGIN INTERFACE */
        .parking-bg {
            position: fixed; inset: 0; z-index: 2500;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1590674899484-d5640e854abe?q=80&w=2000');
            background-size: cover; background-position: center;
            display: flex; justify-content: center; align-items: center;
        }

        .glass-card { 
            background: var(--glass); padding: 40px; border-radius: 20px; 
            width: 380px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border-top: 5px solid var(--red-main);
        }

        .input-group { position: relative; width: 100%; margin-bottom: 15px; }
        
        input[type="email"], input[type="password"], input[type="text"] {
            width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; outline: none; font-size: 1rem;
        }

        .toggle-password {
            position: absolute; right: 10px; top: 12px; cursor: pointer; color: #666; font-size: 0.9rem; user-select: none;
        }

        /* SIDEBAR & CONTENT */
        #sidebar { width: 280px; background: var(--dark-bg); color: white; display: none; flex-direction: column; z-index: 10; }
        .sidebar-brand { padding: 40px 25px; background: var(--red-main); text-align: center; }
        .nav-item { padding: 18px 25px; cursor: pointer; transition: 0.3s; border-bottom: 1px solid #2a2a2a; color: #aaa; }
        .nav-item:hover, .nav-item.active { background: #2a2a2a; color: white; border-left: 5px solid var(--red-main); }

        #main-content { flex-grow: 1; padding: 40px; overflow-y: auto; background: #f4f4f4; display: none; scroll-behavior: smooth; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        .table-container { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px;}
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8f9fa; padding: 15px; text-align: left; color: #666; font-size: 0.75rem; border-bottom: 2px solid #eee; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        
        .btn-main { width:100%; padding:15px; background:var(--red-main); color:white; border:none; border-radius:10px; cursor:pointer; font-weight:bold; font-size: 1rem; }
        .btn-release { background: var(--red-main); color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold;}
        
        #scrollToTopBtn {
            display: none; position: fixed; bottom: 30px; right: 30px; z-index: 99;
            border: none; outline: none; background-color: var(--red-main);
            color: white; cursor: pointer; padding: 15px; border-radius: 50%;
            width: 55px; height: 55px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: 0.3s;
        }

        @media print { 
            body * { visibility: hidden; } 
            #print-area, #print-area * { visibility: visible; } 
            #print-area { position: absolute; top: 0; left: 0; width: 48mm; } 
        }
    </style>
</head>
<body>

<div id="login-overlay" class="parking-bg">
    <div class="glass-card">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRuxO9VJp_ZF82KTCFW4-fkQiJpE60yZ0Atng&s" style="width: 70px; border-radius: 50%; margin-bottom: 15px;">
        <h1 style="color:var(--red-main); margin:0; font-size: 1.5rem;">METRO PLAZA</h1>
        <p style="margin-bottom:25px; color:#555; font-weight: bold;">SECURE LOGIN</p>
        
        <input type="email" id="admin-email" placeholder="Email Address">
        
        <div class="input-group">
            <input type="password" id="pass" placeholder="Password">
            <span class="toggle-password" onclick="togglePass()">👁️ Show</span>
        </div>
        
        <button onclick="loginAdmin()" class="btn-main">SIGN IN</button>
        
        <div style="margin-top: 15px;">
            <a href="#" onclick="forgotPassword()" style="color: #666; font-size: 0.8rem; text-decoration: none;">Forgot Password?</a>
        </div>

        <div id="login-loader" style="display:none; margin-top:15px; color:var(--red-main); font-size: 0.85rem;">Authenticating...</div>
    </div>
</div>

<div id="sidebar">
    <div class="sidebar-brand">
        <h2 style="margin:0;">METRO PLAZA</h2>
        <small id="user-role-tag">SECURE ACCESS</small>
    </div>
    <div class="nav-item active" onclick="showTab('dash', this)">🔴 DASHBOARD</div>
    <div class="nav-item" onclick="showTab('hist', this)">📂 HISTORY</div>
    <div class="nav-item admin-only" onclick="showTab('sale', this)">💰 SALES REPORT</div>
    <div class="nav-item admin-only" onclick="showTab('arch', this)" style="background: #263238;">♻️ RECYCLE BIN</div>
    <div class="nav-item" onclick="logout()" style="margin-top:auto; background:#b71c1c; color:white; text-align:center;">LOGOUT</div>
</div>

<div id="main-content">
    <div class="header-bar">
        <h2 id="view-title">PARKING OVERVIEW</h2>
        <div id="clock" style="font-weight: bold; color: var(--red-main);"></div>
    </div>

    <div id="dash" class="tab-view">
        <div class="table-container">
            <table>
                <thead><tr><th>PLATE</th><th>TIME IN</th><th>FEE</th><th>ACTION</th></tr></thead>
                <tbody id="table-dash-normal"></tbody>
            </table>
        </div>
    </div>

    <div id="hist" class="tab-view" style="display:none">
        <input type="text" style="width: 200px; padding:8px; border-radius:5px; border:1px solid #ddd;" placeholder="Search Plate..." onkeyup="filterTable('table-hist', this.value)">
        <div class="table-container">
            <table>
                <thead><tr><th>PLATE</th><th>IN</th><th>OUT</th><th>DATE</th><th class="admin-only">ACTION</th></tr></thead>
                <tbody id="table-hist"></tbody>
            </table>
        </div>
    </div>

    <div id="sale" class="tab-view admin-only" style="display:none">
        <div class="table-container"><table id="table-sale"></table></div>
    </div>

    <div id="arch" class="tab-view admin-only" style="display:none">
        <div class="table-container"><table id="table-arch"></table></div>
    </div>
</div>

<button onclick="topFunction()" id="scrollToTopBtn">▲</button>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, doc, setDoc, getDocs, deleteDoc, addDoc, onSnapshot, writeBatch, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDecxXNg2dcSM0rCPN_avxapxCXHfxXOSw",
        authDomain: "metroplaza-13b5e.firebaseapp.com",
        projectId: "metroplaza-13b5e",
        storageBucket: "metroplaza-13b5e.firebasestorage.app",
        messagingSenderId: "958136196486",
        appId: "1:958136196486:web:28292dcd6cd5f2bbfae007"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    // --- NEW: TOGGLE PASSWORD VISIBILITY ---
    window.togglePass = () => {
        const passInput = document.getElementById('pass');
        const toggleBtn = document.querySelector('.toggle-password');
        if (passInput.type === "password") {
            passInput.type = "text";
            toggleBtn.innerText = "🙈 Hide";
        } else {
            passInput.type = "password";
            toggleBtn.innerText = "👁️ Show";
        }
    };

    // --- AUTH ACTIONS ---
    window.loginAdmin = async () => {
        const email = document.getElementById('admin-email').value;
        const pass = document.getElementById('pass').value;
        const loader = document.getElementById('login-loader');
        if(!email || !pass) return alert("Please enter both email and password.");
        
        loader.style.display = "block";
        try {
            await signInWithEmailAndPassword(auth, email, pass);
        } catch (e) { alert("Login failed. Please check your credentials."); }
        loader.style.display = "none";
    };

    window.forgotPassword = async () => {
        const email = document.getElementById('admin-email').value;
        if (!email) return alert("Please type your email address first.");
        try {
            await sendPasswordResetEmail(auth, email);
            alert("Reset link sent! Please check your email inbox.");
        } catch (e) { alert(e.message); }
    };

    onAuthStateChanged(auth, user => {
        const isAuth = !!user;
        document.getElementById('login-overlay').style.display = isAuth ? 'none' : 'flex';
        document.getElementById('sidebar').style.display = isAuth ? 'flex' : 'none';
        document.getElementById('main-content').style.display = isAuth ? 'block' : 'none';
        
        if(user) {
            // ADMIN CHECK: Uses the email you created in the console
            const isAdmin = user.email === "admin@metro.ph";
            document.querySelectorAll('.admin-only').forEach(el => el.style.display = isAdmin ? 'block' : 'none');
            document.getElementById('user-role-tag').innerText = isAdmin ? "🔑 ADMIN" : "🛡️ GUARD";
        }
    });

    window.logout = () => { if(confirm("Log out of system?")) signOut(auth); };

    // --- NAVIGATION ---
    window.showTab = (id, el) => {
        document.querySelectorAll('.tab-view').forEach(v => v.style.display = 'none');
        document.getElementById(id).style.display = 'block';
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
    };

    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleString(); }, 1000);

    // --- DATA HANDLING (REAL-TIME) ---
    onSnapshot(collection(db, "active_parking"), snap => {
        document.getElementById('table-dash-normal').innerHTML = snap.docs.map(d => {
            const r = d.data();
            return `<tr><td><b>${r.plate}</b></td><td>${r.entryTime}</td><td>P20.00</td><td><button class="btn-release" onclick="checkOut('${d.id}')">RELEASE</button></td></tr>`;
        }).join('');
    });

    window.filterTable = (id, q) => {
        document.querySelectorAll(`#${id} tr`).forEach(r => {
            r.style.display = r.innerText.toUpperCase().includes(q.toUpperCase()) ? "" : "none";
        });
    }

    window.topFunction = () => document.getElementById("main-content").scrollTo({ top: 0, behavior: 'smooth' });

</script>
</body>
</html>
