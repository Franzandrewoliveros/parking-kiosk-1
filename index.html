<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Metro Plaza - Automated Management</title>
    <style>
        :root { --red: #d32f2f; --dark: #1a1a1a; --glass: rgba(255, 255, 255, 0.95); }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #eee; height: 100vh; display: flex; overflow: hidden; }
        .parking-bg { position: fixed; inset: 0; z-index: 2500; background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1590674899484-d5640e854abe?q=80&w=2000'); background-size: cover; display: flex; justify-content: center; align-items: center; }
        .glass-card { background: var(--glass); padding: 40px; border-radius: 20px; width: 380px; text-align: center; border-top: 5px solid var(--red); }
        #sidebar { width: 280px; background: var(--dark); color: white; display: none; flex-direction: column; z-index: 10; }
        .sidebar-brand { padding: 40px 25px; background: var(--red); text-align: center; }
        .nav-item { padding: 18px 25px; cursor: pointer; border-bottom: 1px solid #2a2a2a; color: #aaa; }
        .nav-item.active { background: #2a2a2a; color: white; border-left: 5px solid var(--red); }
        #main-content { flex-grow: 1; padding: 40px; overflow-y: auto; background: #f4f4f4; display: none; }
        .table-container { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8f9fa; padding: 15px; text-align: left; font-size: 0.75rem; border-bottom: 2px solid #eee; }
        td { padding: 15px; border-bottom: 1px solid #eee; }
        .btn-release { background: var(--red); color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold;}
        #kiosk-view { position: fixed; inset: 0; z-index: 2000; display: none; flex-direction: column; background: var(--dark); }
        .kiosk-input { font-size: 5rem; width: 80%; max-width: 700px; padding: 20px; border-radius: 15px; border: 5px solid var(--red); text-align: center; font-weight: bold; margin-bottom: 20px; }
        .admin-only { display: none; }
    </style>
</head>
<body>

<div id="login-overlay" class="parking-bg">
    <div class="glass-card">
        <h1 style="color:var(--red); margin:0;">METRO PLAZA</h1>
        <p>ACCESS CONTROL</p>
        <button onclick="enterGuard()" style="width:100%; padding:15px; background:#2e7d32; color:white; border:none; border-radius:10px; cursor:pointer; font-weight:bold; margin-bottom:15px;">🛡️ GUARD ACCESS</button>
        <button onclick="showAdminLogin()" style="width:100%; padding:15px; background:var(--red); color:white; border:none; border-radius:10px; cursor:pointer; font-weight:bold;">🔑 ADMIN LOGIN</button>
    </div>
</div>

<div id="kiosk-view" class="parking-bg">
    <div style="text-align:center; color:white; width: 100%;">
        <button onclick="exitKiosk()" style="position:absolute; top:20px; right:20px; background:var(--red); border:none; color:white; padding:10px 20px; border-radius:5px; cursor:pointer;">BACK TO SYSTEM</button>
        <h1 style="font-size: 3rem;">WELCOME</h1>
        <input type="text" id="kioskPlate" class="kiosk-input" placeholder="PLATE NO.">
        <br>
        <button onclick="kioskCheckIn()" style="background:var(--red); color:white; border:none; padding: 20px 80px; font-size: 2rem; border-radius: 15px; cursor: pointer; font-weight: bold;">PRINT TICKET</button>
        <div id="kiosk-feedback" style="margin-top:20px; font-size: 1.5rem;"></div>
    </div>
</div>

<div id="sidebar">
    <div class="sidebar-brand"><h2>METRO PLAZA</h2><small id="role-tag">SYSTEM</small></div>
    <div class="nav-item active" onclick="showTab('dash', this)">DASHBOARD</div>
    <div class="nav-item" onclick="showTab('hist', this)">HISTORY</div>
    <div class="nav-item admin-only" id="nav-sales" onclick="showTab('sale', this)">SALES</div>
    <div class="nav-item" onclick="enterKiosk()" style="color:var(--red); font-weight:bold;">🖥️ OPEN KIOSK</div>
    <div class="nav-item" id="btnConnect" onclick="connectPrinter()" style="color:#00e5ff; font-weight:bold;">🔵 PAIR PRINTER</div>
</div>

<div id="main-content">
    <div id="dash" class="tab-view table-container">
        <table>
            <thead><tr><th>PLATE</th><th>TIME IN</th><th>STATUS</th><th>ACTION</th></tr></thead>
            <tbody id="table-dash"></tbody>
        </table>
    </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, doc, setDoc, getDocs, deleteDoc, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = { /* YOUR FIREBASE CONFIG HERE */ };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let printChar = null;

    // ESC/POS Byte Commands for Senda 58mm
    const PRINTER = {
        init: '\x1b\x40',
        center: '\x1b\x61\x01',
        left: '\x1b\x61\x00',
        bold: '\x1b\x45\x01',
        regular: '\x1b\x45\x00',
        feed: '\n\n\n\n'
    };

    // 1. Bluetooth Connection (Must do this once after login)
    window.connectPrinter = async () => {
        try {
            const device = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true,
                optionalServices: ['0000ff00-0000-1000-8000-00805f9b34fb']
            });
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService('0000ff00-0000-1000-8000-00805f9b34fb');
            printChar = await service.getCharacteristic('0000ff01-0000-1000-8000-00805f9b34fb');
            document.getElementById('btnConnect').innerText = "✅ PRINTER READY";
        } catch (e) { alert("Bluetooth Error: " + e.message); }
    };

    // 2. Automatic Printing Function
    async function autoPrint(text) {
        if (!printChar) return console.warn("Printer not connected");
        await printChar.writeValue(new TextEncoder().encode(text));
    }

    // 3. Kiosk Logic (Entry)
    window.kioskCheckIn = async () => {
        const plate = document.getElementById('kioskPlate').value.trim().toUpperCase();
        if(!plate) return;

        const entryTime = new Date().toLocaleTimeString();
        await setDoc(doc(db, "active_parking", plate), {
            plate, entryTime, rawIn: Date.now(), date: new Date().toLocaleDateString()
        });

        // AUTO PRINT TICKET
        const ticket = PRINTER.init + PRINTER.center + PRINTER.bold + "METRO PLAZA\nENTRY TICKET\n" + 
                       PRINTER.regular + "----------------\n" + 
                       PRINTER.left + `PLATE: ${plate}\nTIME:  ${entryTime}\n` + 
                       "----------------\n" + PRINTER.feed;
        await autoPrint(ticket);
        
        document.getElementById('kioskPlate').value = "";
        document.getElementById('kiosk-feedback').innerText = "✅ TICKET PRINTED";
        setTimeout(() => document.getElementById('kiosk-feedback').innerText = "", 3000);
    };

    // 4. Dashboard Logic (Automatic Print on Release)
    window.checkOut = async (plate) => {
        const snap = await getDocs(collection(db, "active_parking"));
        const data = snap.docs.find(d => d.id === plate)?.data();
        if(!data) return;

        const outTime = new Date().toLocaleTimeString();
        const hrs = Math.ceil((Date.now() - data.rawIn) / (1000 * 60 * 60));
        const fee = hrs > 3 ? 40 + ((hrs - 3) * 10) : 40; // Example: P40 base

        // AUTO PRINT RECEIPT
        const receipt = PRINTER.init + PRINTER.center + PRINTER.bold + "METRO PLAZA\nOFFICIAL RECEIPT\n" + 
                        PRINTER.regular + "----------------\n" +
                        PRINTER.left + `PLATE: ${plate}\nIN:    ${data.entryTime}\nOUT:   ${outTime}\n` + 
                        PRINTER.bold + `FEE:   PHP ${fee}.00\n` + PRINTER.regular +
                        "----------------\n" + PRINTER.center + "DRIVE SAFELY\n" + PRINTER.feed;
        await autoPrint(receipt);

        // Move to history/sales and delete from active
        await addDoc(collection(db, "parking_history"), { ...data, out: outTime, fee });
        await deleteDoc(doc(db, "active_parking", plate));
    };

    // Setup UI listeners
    onSnapshot(collection(db, "active_parking"), (snap) => {
        document.getElementById('table-dash').innerHTML = snap.docs.map(doc => {
            const r = doc.data();
            return `<tr><td><b>${r.plate}</b></td><td>${r.entryTime}</td><td>PARKED</td><td><button class="btn-release" onclick="checkOut('${r.plate}')">RELEASE</button></td></tr>`;
        }).join('');
    });

    // Helper UI functions
    window.enterGuard = () => { document.getElementById('login-overlay').style.display='none'; document.getElementById('sidebar').style.display='flex'; document.getElementById('main-content').style.display='block'; };
    window.enterKiosk = () => document.getElementById('kiosk-view').style.display = 'flex';
    window.exitKiosk = () => document.getElementById('kiosk-view').style.display = 'none';
    window.showTab = (id, el) => { document.querySelectorAll('.tab-view').forEach(v => v.style.display='none'); document.getElementById(id).style.display='block'; };
</script>
</body>
</html>
