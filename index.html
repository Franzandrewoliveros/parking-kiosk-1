<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Motorcycle Parking System - Persistent</title>
    <style>
        :root { --primary: #1a73e8; --sidebar: #2c3e50; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; background: #f8f9fa; height: 100vh; }
        
        /* Sidebar Styles from ADMIN.pdf */
        #sidebar { width: 220px; background: var(--sidebar); color: white; display: flex; flex-direction: column; }
        .nav-item { padding: 18px 25px; cursor: pointer; border-bottom: 1px solid #34495e; transition: 0.3s; }
        .nav-item:hover, .nav-item.active { background: #34495e; border-left: 5px solid var(--primary); }
        .logout { margin-top: auto; padding: 20px; color: #ff4757; text-align: center; cursor: pointer; font-weight: bold; border-top: 1px solid #34495e; }

        /* Main Content Area */
        #main { flex-grow: 1; padding: 30px; overflow-y: auto; }
        .header { display: flex; justify-content: space-between; margin-bottom: 30px; padding-bottom: 15px; border-bottom: 2px solid #eee; }
        .view { display: none; }
        .view.active { display: block; }

        /* Table & Form Styles */
        .kiosk-form { background: white; padding: 20px; border-radius: 8px; display: flex; gap: 10px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        input { flex-grow: 1; padding: 12px; border: 1px solid #ddd; border-radius: 4px; text-transform: uppercase; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f1f3f4; color: #666; font-size: 12px; }
        .status-parked { color: #28a745; font-weight: bold; }
        .status-unparked { color: #dc3545; font-weight: bold; }
        .btn-blue { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }

        @media print { body * { visibility: hidden; } #print-area, #print-area * { visibility: visible; } #print-area { position: absolute; top:0; width: 100%; text-align: center; } }
    </style>
</head>
<body>

<div id="sidebar">
    <div style="padding: 25px; font-weight: bold; font-size: 1.2rem;">ADMIN</div>
    <div class="nav-item active" onclick="showView('dash')">8 DASH BOARD</div>
    <div class="nav-item" onclick="showView('hist')">HISTORY</div>
    <div class="nav-item" onclick="showView('sale')">SALES</div>
    <div class="logout" onclick="location.reload()">LOG OUT</div>
</div>

<div id="main">
    <div class="header">
        <h2 id="view-title">PARKING OVERVIEW</h2>
        <div style="font-weight: bold; color: #555;">WELCOME, ADMIN</div>
    </div>

    <div id="view-dash" class="view active">
        <div class="kiosk-form">
            <input type="text" id="plateInput" placeholder="ENTER PLATE NUMBER (E.G. ABC123)">
            <button class="btn-blue" onclick="checkIn()">CHECK-IN</button>
        </div>
        <table>
            <thead><tr><th>PLATE NUMBER</th><th>VEHICLE</th><th>ENTRY TIME</th><th>OUT</th><th>STATUS</th><th>DATE</th><th>ACTION</th></tr></thead>
            <tbody id="table-dash"></tbody>
        </table>
    </div>

    <div id="view-hist" class="view">
        <table>
            <thead><tr><th>PLATE NUMBER</th><th>VEHICLE</th><th>ENTRY TIME</th><th>OUT</th><th>STATUS</th><th>DATE</th></tr></thead>
            <tbody id="table-hist"></tbody>
        </table>
    </div>

    <div id="view-sale" class="view">
        <table>
            <thead><tr><th>PLATE NUMBER</th><th>HOURS</th><th>PAYMENT</th><th>DATE</th></tr></thead>
            <tbody id="table-sale"></tbody>
        </table>
    </div>
</div>

<div id="print-area"></div>

<script>
    // Load Data from LocalStorage on Startup
    let activeParkers = JSON.parse(localStorage.getItem('active_db')) || [];
    let historyLogs = JSON.parse(localStorage.getItem('history_db')) || [];
    let salesLogs = JSON.parse(localStorage.getItem('sales_db')) || [];

    function saveAll() {
        localStorage.setItem('active_db', JSON.stringify(activeParkers));
        localStorage.setItem('history_db', JSON.stringify(historyLogs));
        localStorage.setItem('sales_db', JSON.stringify(salesLogs));
        render();
    }

    function checkIn() {
        const plate = document.getElementById('plateInput').value.trim().toUpperCase();
        if(!plate) return;

        const entry = {
            plate: plate,
            vehicle: "MOTORCYCLE",
            entryTime: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
            rawTime: new Date().getTime(),
            date: new Date().toLocaleDateString(),
            status: "PARKED"
        };

        activeParkers.push(entry);
        document.getElementById('plateInput').value = '';
        saveAll();
    }

    function checkOut(index) {
        const item = activeParkers[index];
        const now = new Date();
        const diffHrs = Math.ceil((now.getTime() - item.rawTime) / (1000 * 60 * 60));
        
        // Logic: 20 pesos for 4 hours, +5 pesos per extra hour
        let fee = 20; 
        if(diffHrs > 4) fee = 20 + ((diffHrs - 4) * 5);

        // Move to History and Sales
        historyLogs.push({
            ...item, 
            out: now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }), 
            status: "UNPARKED"
        });

        salesLogs.push({
            plate: item.plate,
            hours: diffHrs + " HOURS",
            payment: fee + " PESOS",
            date: item.date
        });

        // Receipt Printing
        document.getElementById('print-area').innerHTML = `<h2>RECEIPT</h2><hr>PLATE: ${item.plate}<br>FEE: ₱${fee}<br>HOURS: ${diffHrs}`;
        window.print();

        activeParkers.splice(index, 1);
        saveAll();
    }

    function showView(view) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('view-' + view).classList.add('active');
        event.currentTarget.classList.add('active');
        const titles = {dash:'PARKING OVERVIEW', hist:'HISTORY', sale:'SALES'};
        document.getElementById('view-title').innerText = titles[view];
    }

    function render() {
        document.getElementById('table-dash').innerHTML = activeParkers.map((r, i) => `
            <tr><td>${r.plate}</td><td>${r.vehicle}</td><td>${r.entryTime}</td><td>--</td>
            <td class="status-parked">${r.status}</td><td>${r.date}</td>
            <td><button onclick="checkOut(${i})">OUT</button></td></tr>`).join('');

        document.getElementById('table-hist').innerHTML = historyLogs.map(r => `
            <tr><td>${r.plate}</td><td>${r.vehicle}</td><td>${r.entryTime}</td><td>${r.out}</td>
            <td class="status-unparked">${r.status}</td><td>${r.date}</td></tr>`).reverse().join('');

        document.getElementById('table-sale').innerHTML = salesLogs.map(s => `
            <tr><td>${s.plate}</td><td>${s.hours}</td><td>${s.payment}</td><td>${s.date}</td></tr>`).reverse().join('');
    }

    render();
</script>
</body>
</html>
