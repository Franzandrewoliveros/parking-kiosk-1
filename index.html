<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metro Plaza Bagong Silang - Management System</title>
    <style>
        :root { 
            --red-main: #d32f2f; --red-dark: #b71c1c; --dark-bg: #1a1a1a; 
            --glass: rgba(255, 255, 255, 0.95);
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #eee; height: 100vh; display: flex; overflow: hidden; }

        /* --- SIDEBAR --- */
        #sidebar { width: 280px; background: var(--dark-bg); color: white; display: flex; flex-direction: column; z-index: 10; }
        .sidebar-brand { padding: 40px 25px; background: var(--red-main); text-align: center; }
        .nav-item { padding: 18px 25px; cursor: pointer; transition: 0.3s; border-bottom: 1px solid #2a2a2a; color: #aaa; }
        .nav-item:hover, .nav-item.active { background: #2a2a2a; color: white; border-left: 5px solid var(--red-main); }

        /* --- MAIN CONTENT --- */
        #main-content { flex-grow: 1; padding: 40px; overflow-y: auto; background: #f4f4f4; }
        .table-container { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8f9fa; padding: 15px; text-align: left; color: #666; font-size: 0.75rem; border-bottom: 2px solid #eee; }
        td { padding: 15px; border-bottom: 1px solid #eee; }
        .btn-release { background: var(--red-main); color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold;}

        /* --- KIOSK --- */
        #kiosk-view { position: fixed; inset: 0; z-index: 2500; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .kiosk-input { font-size: 4rem; width: 80%; max-width: 600px; text-align: center; border: 5px solid var(--red-main); border-radius: 15px; padding: 20px; text-transform: uppercase; }
        
        #print-area { display: none; }
    </style>
</head>
<body>

<div id="kiosk-view">
    <button onclick="exitKiosk()" style="position:absolute; top:20px; right:20px; padding:10px; background:var(--red-main); color:white; border:none; border-radius:5px;">BACK TO ADMIN</button>
    <h1>METRO PLAZA KIOSK</h1>
    <p>ENTER PLATE NUMBER</p>
    <input type="text" id="kioskPlate" class="kiosk-input" placeholder="ABC 123">
    <br>
    <button onclick="kioskCheckIn()" style="background:var(--red-main); color:white; padding:20px 80px; font-size: 2rem; border-radius: 15px; border:none; cursor:pointer; font-weight:bold;">PRINT TICKET</button>
    <div id="kiosk-feedback" style="margin-top:20px; font-size: 1.5rem;"></div>
</div>

<div id="sidebar">
    <div class="sidebar-brand"><h2>METRO PLAZA</h2></div>
    <div class="nav-item active" onclick="showTab('dash')">🔴 DASHBOARD</div>
    <div id="btnConnect" class="nav-item" onclick="connectPrinter()" style="color:#00e5ff;">🔵 PAIR SENDA PRINTER</div>
    <div class="nav-item" onclick="enterKiosk()" style="color:var(--red-main); margin-top:20px;">🖥️ OPEN KIOSK</div>
</div>

<div id="main-content">
    <div class="table-container">
        <table>
            <thead><tr><th>PLATE</th><th>TIME IN</th><th>ACTION</th></tr></thead>
            <tbody id="table-dash"></tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, doc, setDoc, getDocs, deleteDoc, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDecxXNg2dcSM0rCPN_avxapxCXHfxXOSw",
        authDomain: "metroplaza-13b5e.firebaseapp.com",
        projectId: "metroplaza-13b5e",
        storageBucket: "metroplaza-13b5e.firebasestorage.app",
        messagingSenderId: "958136196486",
        appId: "1:958136196486:web:28292dcd6cd5f2bbfae007"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // --- BLUETOOTH CONFIG FOR SENDA 58mm ---
    let printerChar = null;
    const SERVICE_UUID = '0000ff00-0000-1000-8000-00805f9b34fb'; // Standard for Senda
    const CHAR_UUID = '0000ff01-0000-1000-8000-00805f9b34fb';    // Standard for Senda

    const ESC = {
        init: '\x1b\x40',
        center: '\x1b\x61\x01',
        left: '\x1b\x61\x00',
        bold: '\x1b\x45\x01',
        boldOff: '\x1b\x45\x00',
        feed: '\n\n\n'
    };

    window.connectPrinter = async () => {
        try {
            const device = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true, // Easier discovery for generic printers
                optionalServices: [SERVICE_UUID]
            });
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService(SERVICE_UUID);
            printerChar = await service.getCharacteristic(CHAR_UUID);
            document.getElementById('btnConnect').innerText = "✅ PRINTER READY";
            document.getElementById('btnConnect').style.color = "#4caf50";
        } catch (e) { alert("Pairing Error: " + e.message); }
    };

    async function printData(text) {
        if (!printerChar) return false;
        await printerChar.writeValue(new TextEncoder().encode(text));
        return true;
    }

    // --- KIOSK CHECK-IN ---
    window.kioskCheckIn = async () => {
        const pInput = document.getElementById('kioskPlate');
        const plate = pInput.value.trim().toUpperCase();
        if(!plate) return;

        const timeIn = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        await setDoc(doc(db, "active_parking", plate), {
            plate, entryTime: timeIn, rawIn: Date.now(), date: new Date().toLocaleDateString()
        });

        const ticket = ESC.init + ESC.center + ESC.bold + "METRO PLAZA\n" +
                       "ENTRY TICKET\n" + ESC.boldOff + "----------------\n" +
                       ESC.left + `PLATE: ${plate}\nIN:    ${timeIn}\n` +
                       "----------------\n" + ESC.feed;
        
        await printData(ticket);
        pInput.value = "";
        document.getElementById('kiosk-feedback').innerText = "TICKET PRINTED!";
        setTimeout(() => document.getElementById('kiosk-feedback').innerText = "", 3000);
    };

    // --- RELEASE VEHICLE ---
    window.checkOut = async (plate, entryTime, rawIn) => {
        const outTime = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        const hrs = Math.ceil((Date.now() - rawIn) / (3600000));
        const fee = hrs > 4 ? 20 + ((hrs - 4) * 5) : 20; // ₱20 base for 4hrs

        const receipt = ESC.init + ESC.center + ESC.bold + "METRO PLAZA\n" +
                        "RECEIPT\n" + ESC.boldOff + "----------------\n" +
                        ESC.left + `PLATE: ${plate}\nIN:    ${entryTime}\n` +
                        `OUT:   ${outTime}\nSTAY:  ${hrs} HR(S)\n` +
                        ESC.bold + `TOTAL: P${fee}.00\n` + ESC.boldOff +
                        "----------------\n" + ESC.center + "THANK YOU!\n" + ESC.feed;

        await printData(receipt);
        await addDoc(collection(db, "sales_report"), { plate, pay: fee, date: new Date().toLocaleDateString() });
        await deleteDoc(doc(db, "active_parking", plate));
    };

    // Firebase Listeners
    onSnapshot(collection(db, "active_parking"), (snap) => {
        document.getElementById('table-dash').innerHTML = snap.docs.map(doc => {
            const r = doc.data();
            return `<tr><td><b>${r.plate}</b></td><td>${r.entryTime}</td>
                    <td><button class="btn-release" onclick="checkOut('${r.plate}','${r.entryTime}',${r.rawIn})">RELEASE</button></td></tr>`;
        }).join('');
    });

    window.enterKiosk = () => document.getElementById('kiosk-view').style.display = 'flex';
    window.exitKiosk = () => document.getElementById('kiosk-view').style.display = 'none';
</script>
</body>
</html>
