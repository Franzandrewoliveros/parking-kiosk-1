<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metro Plaza Bagong Silang - Management System</title>
    <style>
        :root { 
            --red-main: #d32f2f; --red-dark: #b71c1c; --dark-bg: #1a1a1a; 
            --glass: rgba(255, 255, 255, 0.95); --green-guard: #2e7d32;
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #eee; height: 100vh; display: flex; overflow: hidden; }

        /* --- SIDEBAR --- */
        #sidebar { width: 280px; background: var(--dark-bg); color: white; display: none; flex-direction: column; z-index: 10; }
        .sidebar-brand { padding: 40px 25px; background: var(--red-main); text-align: center; }
        .nav-item { padding: 18px 25px; cursor: pointer; transition: 0.3s; border-bottom: 1px solid #2a2a2a; color: #aaa; font-weight: 500; }
        .nav-item:hover, .nav-item.active { background: #2a2a2a; color: white; border-left: 5px solid var(--red-main); }

        /* --- MAIN CONTENT --- */
        #main-content { flex-grow: 1; padding: 40px; overflow-y: auto; background: #f4f4f4; display: none; }
        .tab-view { display: none; }
        .tab-view.active { display: block; }
        
        .card-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .stat-box { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center; }
        .stat-box h3 { margin: 0; color: var(--red-main); font-size: 2rem; }

        .search-input { width: 100%; padding: 12px 20px; border-radius: 8px; border: 1px solid #ddd; font-size: 1rem; margin-bottom: 20px; box-sizing: border-box; outline: none; }
        .table-container { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8f9fa; padding: 15px; text-align: left; color: #666; font-size: 0.75rem; border-bottom: 2px solid #eee; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid #eee; }

        .btn-release { background: var(--green-guard); color: white; border: none; padding: 10px 18px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-delete { color: var(--red-main); cursor: pointer; border: none; background: none; font-weight: bold; }

        /* --- LOGIN & KIOSK --- */
        .parking-bg { position: fixed; inset: 0; z-index: 2500; background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1590674899484-d5640e854abe?q=80&w=2000') center/cover; display: flex; justify-content: center; align-items: center; }
        .glass-card { background: var(--glass); padding: 40px; border-radius: 20px; width: 380px; text-align: center; }
        #kiosk-view { position: fixed; inset: 0; z-index: 2000; display: none; flex-direction: column; background: var(--dark-bg); color: white; align-items: center; justify-content: center; }
        .kiosk-input { font-size: 4rem; width: 80%; max-width: 600px; padding: 20px; border-radius: 15px; border: 5px solid var(--red-main); text-align: center; text-transform: uppercase; outline: none; }
    </style>
</head>
<body>

<div id="login-overlay" class="parking-bg">
    <div class="glass-card" id="role-selection">
        <h1 style="color:var(--red-main); margin:0;">METRO PLAZA</h1>
        <p style="margin-bottom:30px; font-weight: bold;">SECURITY ACCESS</p>
        <button onclick="enterRole('guard')" style="width:100%; padding:15px; background:var(--green-guard); color:white; border:none; border-radius:10px; cursor:pointer; font-weight:bold; margin-bottom:15px;">🛡️ GUARD ACCESS</button>
        <button onclick="showAdminLogin()" style="width:100%; padding:15px; background:var(--red-main); color:white; border:none; border-radius:10px; cursor:pointer; font-weight:bold;">🔑 ADMIN LOGIN</button>
    </div>
    <div class="glass-card" id="admin-login" style="display:none;">
        <h2 style="color:var(--red-main);">ADMIN PIN</h2>
        <input type="password" id="pass" placeholder="****" style="width:100%; padding:15px; border-radius:10px; border:1px solid #ddd; margin-bottom:20px; text-align: center; font-size: 1.5rem;">
        <button onclick="verifyAdmin()" style="width:100%; padding:15px; background:var(--red-main); color:white; border:none; border-radius:10px; cursor:pointer; font-weight:bold;">LOGIN</button>
    </div>
</div>

<div id="kiosk-view">
    <h1 style="font-size: 2rem;">ENTRANCE KIOSK</h1>
    <input type="text" id="kioskPlate" class="kiosk-input" placeholder="ABC 123">
    <button onclick="kioskCheckIn()" style="background:var(--red-main); color:white; border:none; padding: 20px 80px; font-size: 2rem; border-radius: 15px; cursor: pointer; font-weight: bold; margin-top:20px;">PRINT TICKET</button>
    <button onclick="exitKiosk()" style="margin-top:40px; background:none; border:1px solid white; color:white; padding:10px 20px; cursor:pointer;">Close</button>
</div>

<div id="sidebar">
    <div class="sidebar-brand"><h2 style="margin:0;">METRO PLAZA</h2><small id="user-role-tag">SYSTEM</small></div>
    <div class="nav-item active" onclick="showTab('dash', this)">🔴 LIVE DASHBOARD</div>
    <div id="admin-nav" style="display:none;">
        <div class="nav-item" onclick="showTab('sales', this)">💰 SALES REPORT</div>
    </div>
    <div class="nav-item" onclick="enterKiosk()" style="color:var(--red-main); font-weight: bold;">🖥️ KIOSK MODE</div>
    <div class="nav-item" id="btnConnect" onclick="connectPrinter()" style="font-size: 0.8rem; color:#00e5ff;">🔵 PAIR PRINTER</div>
    <div class="nav-item" onclick="location.reload()" style="margin-top:auto; background:var(--red-dark); color:white; text-align:center;">LOGOUT</div>
</div>

<div id="main-content">
    <div class="header-bar">
        <h2 id="view-title">PARKING OVERVIEW</h2>
        <div id="clock" style="font-weight: bold; color: var(--red-main);"></div>
    </div>

    <div id="dash" class="tab-view active">
        <input type="text" id="dashSearch" class="search-input" placeholder="Search Active Plate..." onkeyup="filterDash()">
        <div class="table-container">
            <table>
                <thead><tr><th>PLATE</th><th>TIME IN</th><th>STATUS</th><th>DATE</th><th>ACTION</th></tr></thead>
                <tbody id="table-dash"></tbody>
            </table>
        </div>
    </div>

    <div id="sales" class="tab-view">
        <div class="card-stats">
            <div class="stat-box"><p>TODAY'S SALES</p><h3 id="today-total">₱0</h3></div>
            <div class="stat-box"><p>TOTAL REVENUE</p><h3 id="grand-total">₱0</h3></div>
        </div>
        <input type="text" id="historySearch" class="search-input" placeholder="Search History (Plate or Date)..." onkeyup="filterHistory()">
        <div class="table-container">
            <table>
                <thead><tr><th>PLATE</th><th>STAY</th><th>PAID</th><th>DATE</th><th></th></tr></thead>
                <tbody id="table-sales"></tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDecxXNg2dcSM0rCPN_avxapxCXHfxXOSw",
        authDomain: "metroplaza-13b5e.firebaseapp.com",
        projectId: "metroplaza-13b5e",
        storageBucket: "metroplaza-13b5e.firebasestorage.app",
        messagingSenderId: "958136196486",
        appId: "1:958136196486:web:28292dcd6cd5f2bbfae007"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let printCharacteristic = null;
    let currentRole = 'guard';

    // ESC/POS Commands for 58mm
    const ESC = { init: '\x1b\x40', center: '\x1b\x61\x01', left: '\x1b\x61\x00', feed: '\n\n\n\n' };

    // --- ACCESS LOGIC ---
    window.showAdminLogin = () => { document.getElementById('role-selection').style.display='none'; document.getElementById('admin-login').style.display='block'; };
    window.enterRole = (role) => { currentRole = role; loginSuccess(); };
    window.verifyAdmin = () => { if(document.getElementById('pass').value === "0526") { currentRole = 'admin'; loginSuccess(); } else { alert("Wrong PIN"); } };

    function loginSuccess() {
        document.getElementById('user-role-tag').innerText = currentRole.toUpperCase() + " MODE";
        if(currentRole === 'admin') document.getElementById('admin-nav').style.display = 'block';
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('sidebar').style.display = 'flex';
        document.getElementById('main-content').style.display = 'block';
    }

    // --- BLUETOOTH ---
    window.connectPrinter = async () => {
        try {
            const device = await navigator.bluetooth.requestDevice({ acceptAllDevices: true, optionalServices: ['0000ff00-0000-1000-8000-00805f9b34fb'] });
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService('0000ff00-0000-1000-8000-00805f9b34fb');
            printCharacteristic = await service.getCharacteristic('0000ff01-0000-1000-8000-00805f9b34fb');
            document.getElementById('btnConnect').innerText = "✅ PRINTER READY";
            alert("Senda Printer Connected!");
        } catch (e) { alert("Error: Use Chrome & Enable Location"); }
    };

    // --- PRICE CALCULATION (₱20 for 4hrs + ₱5/hr after) ---
    function calculateParking(startTime) {
        const diffMs = Date.now() - startTime;
        const totalHours = Math.ceil(diffMs / (1000 * 60 * 60));
        let fee = 20; 
        if (totalHours > 4) fee += (totalHours - 4) * 5;
        return { fee, hours: totalHours };
    }

    // --- DATA HANDLING ---
    onSnapshot(collection(db, "active_parking"), snap => {
        let h = "";
        snap.forEach(d => {
            const r = d.data();
            if(r.plate && r.plate !== "undefined") {
                h += `<tr><td><b>${r.plate}</b></td><td>${r.entryTime}</td><td><span style="color:green">● PARKED</span></td><td>${r.date}</td>
                <td><button class="btn-release" onclick="checkOut('${r.plate}', ${r.rawIn})">RELEASE</button></td></tr>`;
            }
        });
        document.getElementById('table-dash').innerHTML = h;
    });

    onSnapshot(collection(db, "sales_report"), snap => {
        let h = "", today = 0, total = 0;
        const todayStr = new Date().toLocaleDateString();
        snap.forEach(d => {
            const r = d.data();
            if(r.date === todayStr) today += r.paid;
            total += r.paid;
            h += `<tr class="history-row"><td>${r.plate}</td><td>${r.duration} hrs</td><td>₱${r.paid}</td><td>${r.date}</td>
            <td>${currentRole === 'admin' ? `<button class="btn-delete" onclick="deleteRecord('sales_report','${d.id}')">🗑️</button>` : ''}</td></tr>`;
        });
        document.getElementById('table-sales').innerHTML = h;
        document.getElementById('today-total').innerText = "₱" + today;
        document.getElementById('grand-total').innerText = "₱" + total;
    });

    // --- ACTIONS ---
    window.kioskCheckIn = async () => {
        const p = document.getElementById('kioskPlate').value.toUpperCase();
        if(!p) return;
        const entry = { plate: p, entryTime: new Date().toLocaleTimeString(), date: new Date().toLocaleDateString(), rawIn: Date.now() };
        await setDoc(doc(db, "active_parking", p), entry);
        if(printCharacteristic) {
            const ticket = ESC.init + ESC.center + "METRO PLAZA\nBAGONG SILANG\n--------------------------------\nENTRY TICKET\n\n" + 
                           ESC.left + `PLATE: ${p}\nDATE:  ${entry.date}\nTIME:  ${entry.entryTime}\n` + 
                           "--------------------------------\n" + ESC.center + "PLEASE KEEP THIS TICKET\n" + ESC.feed;
            await printCharacteristic.writeValue(new TextEncoder().encode(ticket));
        }
        document.getElementById('kioskPlate').value = "";
        alert("Entry Registered & Printed!");
    };

    window.checkOut = async (plate, startTime) => {
        const calc = calculateParking(startTime);
        const exitTime = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const dateStr = new Date().toLocaleDateString();

        if(confirm(`Release ${plate}?\nStay: ${calc.hours} hrs\nFee: ₱${calc.fee}`)) {
            await addDoc(collection(db, "sales_report"), { plate, paid: calc.fee, duration: calc.hours, date: dateStr });
            await deleteDoc(doc(db, "active_parking", plate));

            if(printCharacteristic) {
                const receipt = ESC.init + ESC.center + "METRO PLAZA\nBAGONG SILANG\n--------------------------------\nOFFICIAL RECEIPT\n\n" + 
                                ESC.left + `PLATE:    ${plate}\nDATE:     ${dateStr}\nOUT:      ${exitTime}\nDURATION: ${calc.hours} hr(s)\n` + 
                                "--------------------------------\n" + ESC.center + `TOTAL: PHP ${calc.fee}.00\n` + 
                                "--------------------------------\nTHANK YOU! DRIVE SAFELY\n" + ESC.feed;
                await printCharacteristic.writeValue(new TextEncoder().encode(receipt));
            }
        }
    };

    // --- UTILS ---
    window.filterDash = () => {
        let val = document.getElementById('dashSearch').value.toUpperCase();
        let rows = document.getElementById('table-dash').getElementsByTagName('tr');
        for (let row of rows) row.style.display = row.innerText.toUpperCase().includes(val) ? "" : "none";
    };
    window.filterHistory = () => {
        let val = document.getElementById('historySearch').value.toUpperCase();
        let rows = document.getElementsByClassName('history-row');
        for (let row of rows) row.style.display = row.innerText.toUpperCase().includes(val) ? "" : "none";
    };
    window.deleteRecord = async (coll, id) => { if(confirm("Admin: Delete this sale?")) await deleteDoc(doc(db, coll, id)); };
    window.showTab = (id, el) => {
        document.querySelectorAll('.tab-view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
    };
    window.enterKiosk = () => document.getElementById('kiosk-view').style.display = 'flex';
    window.exitKiosk = () => document.getElementById('kiosk-view').style.display = 'none';
    setInterval(() => document.getElementById('clock').innerText = new Date().toLocaleString(), 1000);
</script>
</body>
</html>
