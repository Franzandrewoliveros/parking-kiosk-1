<script type="module">
    // 1. Firebase Cloud Imports
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, doc, setDoc, getDocs, deleteDoc, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // 2. Your Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyDecxXNg2dcSM0rCPN_avxapxCXHfxXOSw",
        authDomain: "metroplaza-13b5e.firebaseapp.com",
        projectId: "metroplaza-13b5e",
        storageBucket: "metroplaza-13b5e.firebasestorage.app",
        messagingSenderId: "958136196486",
        appId: "1:958136196486:web:28292dcd6cd5f2bbfae007"
    };

    // 3. Initialize Firebase & Database
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // --- SYSTEM CLOCK ---
    setInterval(() => { 
        document.getElementById('clock').innerText = new Date().toLocaleString(); 
    }, 1000);

    // --- AUTHENTICATION ---
    window.login = function() {
        if(document.getElementById('pass').value === "0526") {
            document.getElementById('login-overlay').style.display = 'none';
            render(); 
        } else { alert("Access Denied"); }
    };

    // --- NAVIGATION ---
    window.enterKiosk = () => { 
        document.getElementById('kiosk-view').style.display = 'flex'; 
        document.getElementById('kioskPlate').focus();
    };
    window.exitKiosk = () => { document.getElementById('kiosk-view').style.display = 'none'; };
    
    window.showTab = (tabId, el) => {
        document.querySelectorAll('.tab-view').forEach(v => v.style.display = 'none');
        document.getElementById(tabId).style.display = 'block';
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        const titles = {dash:'PARKING OVERVIEW', hist:'HISTORY LOGS', sale:'SALES REPORT'};
        document.getElementById('view-title').innerText = titles[tabId];
    };

    // --- CLOUD CHECK-IN ---
    window.kioskCheckIn = async () => {
        const pInput = document.getElementById('kioskPlate');
        const plate = pInput.value.trim().toUpperCase();
        if(!plate) return;

        try {
            // Save to 'active_parking' collection
            await setDoc(doc(db, "active_parking", plate), {
                plate: plate,
                entryTime: new Date().toLocaleTimeString(),
                rawIn: Date.now(),
                date: new Date().toLocaleDateString(),
                status: "PARKED"
            });
            document.getElementById('kiosk-status').innerHTML = "✅ SAVED TO CLOUD: " + plate;
            pInput.value = ""; 
            render();
            setTimeout(() => { document.getElementById('kiosk-status').innerText = ""; }, 3000);
        } catch (e) {
            console.error(e);
            document.getElementById('kiosk-status').innerText = "❌ CLOUD ERROR";
        }
    };

    // --- CLOUD CHECK-OUT ---
    window.checkOut = async (plate) => {
        try {
            const activeRef = doc(db, "active_parking", plate);
            const activeDocs = await getDocs(collection(db, "active_parking"));
            const data = activeDocs.docs.find(d => d.id === plate)?.data();

            if(!data) return;

            const hrs = Math.ceil((Date.now() - data.rawIn) / (1000 * 60 * 60));
            const payment = hrs > 4 ? 20 + ((hrs - 4) * 5) : 20;

            // 1. Print Receipt
            document.getElementById('print-area').innerHTML = `
                <div style="text-align:center; padding:20px; border:2px dashed #000;">
                    <h2>METRO PLAZA</h2><p>Bagong Silang</p><hr>
                    <b>PLATE: ${plate}</b><br>
                    TIME IN: ${data.entryTime}<br>
                    TIME OUT: ${new Date().toLocaleTimeString()}<br>
                    <h3>FEE: P${payment}.00</h3>
                </div>`;
            window.print();

            // 2. Move to History & Sales Collections
            const timeOut = new Date().toLocaleTimeString();
            await setDoc(doc(collection(db, "parking_history")), { ...data, out: timeOut, status: "EXITED" });
            await setDoc(doc(collection(db, "sales_report")), { plate, hrs: hrs + " hrs", pay: "P" + payment, date: data.date, timestamp: Date.now() });

            // 3. Delete from Active
            await deleteDoc(activeRef);
            render();
        } catch (e) {
            alert("Check-out failed: " + e.message);
        }
    };

    // --- CLOUD RENDER (LIVE DATA) ---
    window.render = async () => {
        // Load Active
        const activeSnap = await getDocs(collection(db, "active_parking"));
        document.getElementById('table-dash').innerHTML = activeSnap.docs.map(doc => {
            const r = doc.data();
            return `<tr><td><b>${r.plate}</b></td><td>${r.entryTime}</td><td><span style="color:green">● PARKED</span></td><td>${r.date}</td><td><button class="btn-release" onclick="checkOut('${r.plate}')">RELEASE</button></td></tr>`;
        }).join('');

        // Load History (Last 50)
        const histSnap = await getDocs(query(collection(db, "parking_history"), limit(50)));
        document.getElementById('table-hist').innerHTML = histSnap.docs.reverse().map(doc => {
            const r = doc.data();
            return `<tr><td>${r.plate}</td><td>${r.entryTime}</td><td>${r.out}</td><td style="color:red">EXITED</td><td>${r.date}</td></tr>`;
        }).join('');

        // Load Sales
        const salesSnap = await getDocs(query(collection(db, "sales_report"), orderBy("timestamp", "desc")));
        document.getElementById('table-sale').innerHTML = salesSnap.docs.map(doc => {
            const r = doc.data();
            return `<tr><td><b>${r.plate}</b></td><td>${r.hrs}</td><td style="color:var(--red-main)">${r.pay}</td><td>${r.date}</td></tr>`;
        }).join('');
    };

};
    // Initial Load if already logged in (optional)
    // render();
</script>
