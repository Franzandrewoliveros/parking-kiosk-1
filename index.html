<style>
    /* Shake animation for wrong PIN */
    @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-10px); }
        75% { transform: translateX(10px); }
    }
    .shake { animation: shake 0.2s ease-in-out 0s 2; border-color: var(--red-main) !important; }

    .forgot-btn {
        background: none; border: none; color: #888; 
        cursor: pointer; font-size: 0.8rem; margin-top: 15px; 
        text-decoration: underline; transition: var(--transition);
    }
    .forgot-btn:hover { color: var(--red-main); }
</style>

<div class="glass-card" id="guard-login" style="display:none;">
    <h1 style="color:var(--green-guard); margin:0;">GUARD LOGIN</h1>
    <div class="input-group">
        <input type="password" id="guard-pass" placeholder="GUARD PIN" style="width:100%; padding:15px; border-radius:10px; border:1px solid #ddd; text-align: center; box-sizing: border-box;">
        <span class="toggle-pass" onclick="togglePass('guard-pass')">👁️</span>
    </div>
    <button onclick="verifyGuard()" style="width:100%; padding:15px; background:var(--green-guard); color:white; border-radius:10px; font-weight:bold; width:100%;">VERIFY</button>
    <div style="display:flex; justify-content: space-between; align-items: center;">
        <button onclick="backToSelection()" class="forgot-btn">← Back</button>
        <button onclick="handleForgotPin()" class="forgot-btn">Forgot PIN?</button>
    </div>
</div>

<div class="glass-card" id="admin-login" style="display:none;">
    <h1 style="color:var(--red-main); margin:0;">ADMIN LOGIN</h1>
    <div class="input-group">
        <input type="password" id="pass" placeholder="PIN" style="width:100%; padding:15px; border-radius:10px; border:1px solid #ddd; text-align: center; box-sizing: border-box;">
        <span class="toggle-pass" onclick="togglePass('pass')">👁️</span>
    </div>
    <button onclick="loginAdmin()" style="width:100%; padding:15px; background:var(--red-main); color:white; border-radius:10px; font-weight:bold; width:100%;">VERIFY</button>
    <div style="display:flex; justify-content: space-between; align-items: center;">
        <button onclick="backToSelection()" class="forgot-btn">← Back</button>
        <button onclick="handleForgotPin()" class="forgot-btn">Forgot PIN?</button>
    </div>
</div>

<script>
    // ADD THIS TO YOUR SCRIPT SECTION
    const MASTER_RECOVERY_KEY = "METRO2026";

    window.handleForgotPin = () => {
        const input = prompt("Enter Master Recovery Key to reveal PINs:");
        if (input === MASTER_RECOVERY_KEY) {
            alert(`RECOVERY SUCCESSFUL\n\nAdmin PIN: ${currentAdminPin}\nGuard PIN: ${currentGuardPin}`);
        } else if (input !== null) {
            alert("Invalid Master Key. Access Denied.");
        }
    };

    // Update your verify functions to include the shake effect
    window.verifyGuard = () => {
        const el = document.getElementById('guard-pass');
        if(el.value === currentGuardPin) { 
            currentUserRole = "guard"; 
            loginSuccess("🛡️ GUARD MODE"); 
        } else { 
            el.classList.add('shake');
            setTimeout(() => el.classList.remove('shake'), 400);
        }
    };

    window.loginAdmin = () => {
        const el = document.getElementById('pass');
        if(el.value === currentAdminPin) { 
            currentUserRole = "admin"; 
            loginSuccess("🔑 ADMIN MODE"); 
        } else { 
            el.classList.add('shake');
            setTimeout(() => el.classList.remove('shake'), 400);
        }
    };
</script>
