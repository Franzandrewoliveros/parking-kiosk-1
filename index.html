<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Metro Plaza Bagong Silang - Management System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root { 
            --red-main: #d32f2f; --red-dark: #b71c1c; --dark-bg: #1a1a1a; 
            --glass: rgba(255, 255, 255, 0.95); --text-light: #f5f5f5;
            --green-guard: #2e7d32; --blue-archive: #1976d2;
            --warning-orange: #ef6c00; --cream-bg: #fffcf5;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #eee; height: 100vh; display: flex; overflow: hidden; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideIn { from { transform: translateX(-100%); } to { transform: translateX(0); } }
        
        .parking-bg {
            position: fixed; inset: 0; z-index: 2500;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1590674899484-d5640e854abe?q=80&w=2000');
            background-size: cover; background-position: center;
            display: flex; justify-content: center; align-items: center;
        }

        .glass-card { 
            background: var(--glass); padding: 40px; border-radius: 20px; 
            width: 380px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border-top: 5px solid var(--red-main); animation: fadeIn 0.5s ease-out;
        }

        #sidebar { width: 280px; background: var(--dark-bg); color: white; display: none; flex-direction: column; z-index: 10; animation: slideIn 0.4s ease-out; }
        .sidebar-brand { padding: 40px 25px; background: var(--red-main); text-align: center; }
        .nav-item { padding: 18px 25px; cursor: pointer; transition: var(--transition); border-bottom: 1px solid #2a2a2a; color: #aaa; }
        .nav-item:hover { background: #2a2a2a; color: white; padding-left: 35px; }
        .nav-item.active { background: #2a2a2a; color: white; border-left: 5px solid var(--red-main); }

        #main-content { flex-grow: 1; padding: 40px; overflow-y: auto; background: #f4f4f4; display: none; }
        .tab-view { animation: fadeIn 0.4s ease-in-out; }
        
        .table-container { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px;}
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8f9fa; padding: 15px; text-align: left; color: #666; font-size: 0.75rem; border-bottom: 2px solid #eee; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        
        .btn-release { background: var(--red-main); color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-export { background: #2e7d32; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        .search-box { padding: 10px; border-radius: 8px; border: 1px solid #ddd; width: 180px; outline: none; }
        .sales-summary { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-top: 20px; }
        .total-bar { background: var(--dark-bg); color: white; padding: 20px; border-radius: 10px; text-align: center; }

        .export-controls { margin-left: auto; display: flex; gap: 10px; align-items: center; }
        .export-select { padding: 10px; border-radius: 8px; border: 1px solid #ddd; background: white; font-weight: bold; }

        .admin-only { display: none; }
        @media print { body * { visibility: hidden; } #print-area, #print-area * { visibility: visible; } }
    </style>
</head>
<body>

<div id="login-overlay" class="parking-bg">
    <div class="glass-card" id="role-selection">
        <h1>METRO PLAZA</h1>
        <button onclick="loginAdmin()" style="width:100%; padding:15px; background:var(--red-main); color:white; border:none; border-radius:10px; cursor:pointer;">ADMIN LOGIN (PIN: 0526)</button>
    </div>
</div>

<div id="sidebar">
    <div class="sidebar-brand"><h2>METRO PLAZA</h2></div>
    <div class="nav-item active" onclick="showTab('dash', this)"> DASHBOARD</div>
    <div class="nav-item admin-only" onclick="showTab('sale', this)">💰 SALES REPORT</div>
    <div class="nav-item" onclick="location.reload()" style="margin-top:auto; background:#b71c1c; color:white; text-align:center;">LOGOUT</div>
</div>

<div id="main-content">
    <div id="dash" class="tab-view">
        <h2>ACTIVE PARKING</h2>
        <div class="table-container">
            <table>
                <thead><tr><th>PLATE</th><th>TIME IN</th><th>FEE</th><th>ACTION</th></tr></thead>
                <tbody id="table-dash-normal"></tbody>
            </table>
        </div>
    </div>

    <div id="sale" class="tab-view admin-only" style="display:none">
        <div style="display: flex; gap: 10px; margin-bottom: 15px; align-items: center;">
            <input type="text" class="search-box" placeholder="Search Plate..." onkeyup="filterTable('table-sale', this.value)">
            
            <div class="export-controls">
                <select id="exportRange" class="export-select">
                    <option value="today">Daily (Today)</option>
                    <option value="weekly">Weekly (7 Days)</option>
                    <option value="monthly">Monthly (30 Days)</option>
                </select>
                <button class="btn-export" onclick="exportSalesToExcel()">📊 DOWNLOAD EXCEL</button>
            </div>
        </div>
        
        <div class="table-container">
            <table>
                <thead><tr><th>REF #</th><th>PLATE</th><th>TOTAL FEE</th><th>DATE</th></tr></thead>
                <tbody id="table-sale"></tbody>
            </table>
        </div>

        <div class="sales-summary">
            <div class="total-bar"><h3>DAILY</h3><span id="today-total">P0.00</span></div>
            <div class="total-bar"><h3>WEEKLY</h3><span id="weekly-total">P0.00</span></div>
            <div class="total-bar"><h3>MONTHLY</h3><span id="monthly-total">P0.00</span></div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, doc, setDoc, getDocs, deleteDoc, addDoc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDecxXNg2dcSM0rCPN_avxapxCXHfxXOSw",
        authDomain: "metroplaza-13b5e.firebaseapp.com",
        projectId: "metroplaza-13b5e",
        storageBucket: "metroplaza-13b5e.firebasestorage.app",
        databaseURL: "https://metroplaza-13b5e-default-rtdb.asia-southeast1.firebasedatabase.app"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let salesSnap = [];

    window.loginAdmin = () => {
        const pin = prompt("Enter Admin PIN:");
        if(pin === "0526") {
            document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'block');
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('sidebar').style.display = 'flex';
            document.getElementById('main-content').style.display = 'block';
        }
    };

    // --- REAL-TIME SALES DATA ---
    onSnapshot(collection(db, "sales_report"), (snap) => {
        salesSnap = snap.docs;
        renderSales();
    });

    function renderSales() {
        let monthly = 0, today = 0, weekly = 0;
        const now = Date.now();
        const todayStr = new Date().toLocaleDateString();
        
        const html = salesSnap.map(d => {
            const r = d.data();
            const fee = Number(r.pay) || 0;
            const ts = r.timestamp || 0;
            
            // Logic for totals
            if (ts >= now - (30 * 86400000)) monthly += fee;
            if (ts >= now - (7 * 86400000)) weekly += fee;
            if (r.date === todayStr) today += fee;

            return `<tr><td>#${d.id.substring(0,5)}</td><td>${r.plate}</td><td>P${fee}</td><td>${r.date}</td></tr>`;
        }).join('');

        document.getElementById('table-sale').innerHTML = html;
        document.getElementById('today-total').innerText = "P" + today.toFixed(2);
        document.getElementById('weekly-total').innerText = "P" + weekly.toFixed(2);
        document.getElementById('monthly-total').innerText = "P" + monthly.toFixed(2);
    }

    // --- BULLETPROOF EXCEL EXPORT ---
    window.exportSalesToExcel = () => {
        if (!window.XLSX) return alert("Excel library still loading...");
        if (salesSnap.length === 0) return alert("No data to export.");

        const range = document.getElementById('exportRange').value;
        const now = Date.now();
        const todayStr = new Date().toLocaleDateString();

        const filtered = salesSnap.filter(d => {
            const r = d.data();
            const ts = r.timestamp || 0;
            if (range === 'today') return r.date === todayStr;
            if (range === 'weekly') return ts >= now - (7 * 86400000);
            if (range === 'monthly') return ts >= now - (30 * 86400000);
            return true;
        });

        if (filtered.length === 0) return alert("No records found for this period.");

        const data = filtered.map(d => ({
            "Reference": d.id.toUpperCase(),
            "Plate": d.data().plate,
            "Fee": d.data().pay,
            "Date": d.data().date
        }));

        const ws = XLSX.utils.json_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Sales");
        XLSX.writeFile(wb, `MetroPlaza_${range}_Report.xlsx`);
    };

    window.showTab = (id, el) => {
        document.querySelectorAll('.tab-view').forEach(v => v.style.display = 'none');
        document.getElementById(id).style.display = 'block';
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
    };

    window.filterTable = (id, q) => {
        document.querySelectorAll(`#${id} tr`).forEach(r => {
            r.style.display = r.innerText.toUpperCase().includes(q.toUpperCase()) ? "" : "none";
        });
    };
</script>
</body>
</html>
