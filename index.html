<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Metro Plaza Bagong Silang - Management System</title>
    <style>
        :root { 
            --red-main: #d32f2f; --red-dark: #b71c1c; --dark-bg: #1a1a1a; 
            --glass: rgba(255, 255, 255, 0.95); --text-light: #f5f5f5;
            --green-guard: #2e7d32; --blue-archive: #1976d2;
        }
        
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #eee; height: 100vh; display: flex; overflow: hidden; }

        .parking-bg {
            position: fixed; inset: 0; z-index: 2500;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1590674899484-d5640e854abe?q=80&w=2000');
            background-size: cover; background-position: center;
            display: flex; justify-content: center; align-items: center;
        }

        .glass-card { 
            background: var(--glass); padding: 40px; border-radius: 20px; 
            width: 380px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border-top: 5px solid var(--red-main);
        }

        /* --- SIDEBAR --- */
        #sidebar { width: 280px; background: var(--dark-bg); color: white; display: none; flex-direction: column; z-index: 10; }
        .sidebar-brand { padding: 40px 25px; background: var(--red-main); text-align: center; }
        .nav-item { padding: 18px 25px; cursor: pointer; transition: 0.3s; border-bottom: 1px solid #2a2a2a; color: #aaa; }
        .nav-item:hover, .nav-item.active { background: #2a2a2a; color: white; border-left: 5px solid var(--red-main); }

        /* --- MAIN CONTENT --- */
        #main-content { flex-grow: 1; padding: 40px; overflow-y: auto; background: #f4f4f4; display: none; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        .table-container { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px;}
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8f9fa; padding: 15px; text-align: left; color: #666; font-size: 0.75rem; border-bottom: 2px solid #eee; }
        td { padding: 15px; border-bottom: 1px solid #eee; }
        
        .btn-release { background: var(--red-main); color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold;}
        .btn-delete { background: #444; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
        .btn-restore { background: var(--green-guard); color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; margin-right: 5px;}
        .btn-clear { background: var(--red-dark); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        .search-box { padding: 10px; border-radius: 8px; border: 1px solid #ddd; width: 250px; margin-bottom: 15px; }

        #kiosk-view { position: fixed; inset: 0; z-index: 2000; display: none; flex-direction: column; }
        .kiosk-nav { background: var(--dark-bg); padding: 15px 30px; display: flex; justify-content: space-between; color: white; }
        .kiosk-input { font-size: 5rem; width: 700px; padding: 20px; border-radius: 15px; border: 5px solid var(--red-main); text-align: center; font-weight: bold; margin-bottom: 20px; }

        .admin-only { display: none; }
        .guard-only { display: none; }

        @media print { 
            body * { visibility: hidden; } 
            #print-area, #print-area * { visibility: visible; } 
            #print-area { position: absolute; top: 0; width: 100%; text-align: center; } 
        }
    </style>
</head>
<body>

<div id="login-overlay" class="parking-bg">
    <div class="glass-card" id="role-selection">
        <h1 style="color:var(--red-main); margin:0;">METRO PLAZA</h1>
        <p style="margin-bottom:30px; color:#555; font-weight: bold;">SELECT ACCESS LEVEL</p>
        <button onclick="enterGuard()" style="width:100%; padding:15px; background:var(--green-guard); color:white; border:none; border-radius:10px; cursor:pointer; font-weight:bold; font-size:1.1rem; margin-bottom:15px;">🛡️ GUARD ACCESS</button>
        <button onclick="showAdminLogin()" style="width:100%; padding:15px; background:var(--red-main); color:white; border:none; border-radius:10px; cursor:pointer; font-weight:bold; font-size:1.1rem;">🔑 ADMIN LOGIN</button>
    </div>
    <div class="glass-card" id="admin-login" style="display:none;">
        <h1 style="color:var(--red-main); margin:0;">ADMIN LOGIN</h1>
        <input type="password" id="pass" placeholder="PIN" style="width:100%; padding:15px; border-radius:10px; border:1px solid #ddd; margin-bottom:20px; text-align: center;">
        <button onclick="loginAdmin()" style="width:100%; padding:15px; background:var(--red-main); color:white; border:none; border-radius:10px; cursor:pointer; font-weight:bold;">VERIFY</button>
        <button onclick="backToSelection()" style="background:none; border:none; color:#666; cursor:pointer; text-decoration:underline; display:block; margin: 10px auto;">Go Back</button>
    </div>
</div>

<div id="kiosk-view" class="parking-bg" style="flex-direction: column;">
    <div class="kiosk-nav" style="position: absolute; top: 0; width: 100%; box-sizing: border-box;">
        <span style="font-weight: bold; color: var(--red-main);">METRO PLAZA KIOSK</span>
        <button onclick="exitKiosk()" style="background:var(--red-main); border:none; color:white; cursor:pointer; border-radius:5px; padding: 8px 15px;">← BACK</button>
    </div>
    <div style="text-align:center; color:white;">
        <h1 style="font-size: 4rem; margin: 0;">WELCOME</h1>
        <input type="text" id="kioskPlate" class="kiosk-input" placeholder="ABC 123">
        <br>
        <button onclick="kioskCheckIn()" style="background:var(--red-main); color:white; border:none; padding: 20px 80px; font-size: 2rem; border-radius: 15px; cursor: pointer;">CHECK-IN</button>
        <div id="kiosk-feedback" style="margin-top:25px; font-size: 2.5rem; font-weight: bold; height: 60px;"></div>
    </div>
</div>

<div id="sidebar">
    <div class="sidebar-brand"><h2>METRO PLAZA</h2><small id="user-role-tag">SYSTEM</small></div>
    <div class="nav-item active" onclick="showTab('dash', this)">🔴 DASHBOARD</div>
    <div class="nav-item" onclick="showTab('hist', this)">📂 HISTORY</div>
    <div class="nav-item admin-only" id="nav-sales" onclick="showTab('sale', this)">💰 SALES</div>
    <div class="nav-item admin-only" onclick="showTab('arch', this)" style="background: #263238;">♻️ ARCHIVE</div>
    <div class="nav-item guard-only" onclick="enterKiosk()" style="color:var(--red-main); font-weight: bold;">🖥️ KIOSK MODE</div>
    <div class="nav-item" onclick="location.reload()" style="margin-top:auto; background:#b71c1c; color:white; text-align:center;">LOGOUT</div>
</div>

<div id="main-content">
    <div class="header-bar"><h2 id="view-title">PARKING OVERVIEW</h2><div id="clock"></div></div>

    <div id="dash" class="tab-view table-container">
        <table>
            <thead><tr><th>PLATE</th><th>TIME IN</th><th>STATUS</th><th>DATE</th><th>ACTION</th></tr></thead>
            <tbody id="table-dash"></tbody>
        </table>
    </div>

    <div id="hist" class="tab-view" style="display:none">
        <div style="display:flex; justify-content: space-between;">
            <input type="text" class="search-box" placeholder="Search Plate..." onkeyup="filterTable('table-hist', this.value)">
            <button class="btn-clear admin-only" onclick="archiveAll('parking_history')">ARCHIVE ALL</button>
        </div>
        <div class="table-container">
            <table>
                <thead><tr><th>PLATE</th><th>IN</th><th>OUT</th><th>DATE</th><th class="admin-only">ACTION</th></tr></thead>
                <tbody id="table-hist"></tbody>
            </table>
        </div>
    </div>

    <div id="sale" class="tab-view admin-only" style="display:none">
        <div style="display:flex; justify-content: space-between;">
            <input type="text" class="search-box" placeholder="Search..." onkeyup="filterTable('table-sale', this.value)">
            <button class="btn-clear" onclick="archiveAll('sales_report')">ARCHIVE ALL</button>
        </div>
        <div class="table-container">
            <table>
                <thead><tr><th>PLATE</th><th>FEE</th><th>DATE</th><th>ACTION</th></tr></thead>
                <tbody id="table-sale"></tbody>
            </table>
        </div>
    </div>

    <div id="arch" class="tab-view admin-only" style="display:none">
        <button class="btn-clear" onclick="clearCollection('archive')">PERMANENTLY EMPTY BIN</button>
        <div class="table-container" style="margin-top:15px;">
            <table>
                <thead><tr><th>PLATE</th><th>TYPE</th><th>DELETED AT</th><th>ACTION</th></tr></thead>
                <tbody id="table-arch"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="print-area"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, doc, setDoc, getDocs, deleteDoc, addDoc, onSnapshot, writeBatch, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDecxXNg2dcSM0rCPN_avxapxCXHfxXOSw",
        authDomain: "metroplaza-13b5e.firebaseapp.com",
        projectId: "metroplaza-13b5e",
        storageBucket: "metroplaza-13b5e.firebasestorage.app",
        messagingSenderId: "958136196486",
        appId: "1:958136196486:web:28292dcd6cd5f2bbfae007"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let currentUserRole = "guard";

    // --- ARCHIVE SINGLE RECORD ---
    window.moveToArchive = async (sourceCol, id) => {
        if(!confirm("Move this record to Archive?")) return;
        const docRef = doc(db, sourceCol, id);
        const docSnap = await getDoc(docRef);
        if (docSnap.exists()) {
            await addDoc(collection(db, "archive"), { 
                ...docSnap.data(), 
                originalCol: sourceCol, 
                deletedAt: new Date().toLocaleString() 
            });
            await deleteDoc(docRef);
        }
    };

    // --- RESTORE ---
    window.restoreFromArchive = async (id) => {
        const docRef = doc(db, "archive", id);
        const docSnap = await getDoc(docRef);
        if (docSnap.exists()) {
            const data = docSnap.data();
            const targetCol = data.originalCol;
            delete data.originalCol;
            delete data.deletedAt;
            await addDoc(collection(db, targetCol), data);
            await deleteDoc(docRef);
        }
    };

    // --- CORE LOGIC (Check In/Out) ---
    window.kioskCheckIn = async () => {
        const plate = document.getElementById('kioskPlate').value.trim().toUpperCase();
        if(!plate) return;
        await setDoc(doc(db, "active_parking", plate), { plate, entryTime: new Date().toLocaleTimeString(), rawIn: Date.now(), date: new Date().toLocaleDateString() });
        document.getElementById('kioskPlate').value = "";
        document.getElementById('kiosk-feedback').innerHTML = "✅ SUCCESS";
        setTimeout(() => document.getElementById('kiosk-feedback').innerHTML = "", 2000);
    };

    window.checkOut = async (plate) => {
        const snap = await getDocs(collection(db, "active_parking"));
        const data = snap.docs.find(d => d.id === plate)?.data();
        if(!data) return;
        const outTime = new Date().toLocaleTimeString();
        const hrs = Math.ceil((Date.now() - data.rawIn) / (1000 * 60 * 60));
        const payment = hrs > 4 ? 20 + ((hrs - 4) * 5) : 20;

        // Print Receipt (Simplified for flow)
        document.getElementById('print-area').innerHTML = `<div style="border:2px solid black; padding:20px; text-align:center; background:white; font-family:monospace;"><h2>METRO PLAZA</h2><hr><p>PLATE: ${plate}</p><p>TIME IN: ${data.entryTime}</p><p>TIME OUT: ${outTime}</p><h1>TOTAL: P${payment}.00</h1><p>Please keep this receipt.</p></div>`;
        window.print();

        await addDoc(collection(db, "parking_history"), { ...data, out: outTime });
        await addDoc(collection(db, "sales_report"), { plate, pay: payment, date: data.date });
        await deleteDoc(doc(db, "active_parking", plate));
    };

    // --- UI/AUTH ---
    window.enterGuard = () => { currentUserRole = "guard"; loginSuccess("GUARD"); };
    window.showAdminLogin = () => { document.getElementById('role-selection').style.display='none'; document.getElementById('admin-login').style.display='block'; };
    window.loginAdmin = () => { if(document.getElementById('pass').value === "0526") { currentUserRole = "admin"; loginSuccess("ADMIN"); } };
    window.backToSelection = () => { document.getElementById('role-selection').style.display='block'; document.getElementById('admin-login').style.display='none'; };

    function loginSuccess(tag) {
        document.getElementById('user-role-tag').innerText = tag;
        document.querySelectorAll('.admin-only').forEach(el => el.style.display = (currentUserRole === "admin") ? 'block' : 'none');
        document.querySelectorAll('.guard-only').forEach(el => el.style.display = (currentUserRole === "guard") ? 'block' : 'none');
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('sidebar').style.display = 'flex';
        document.getElementById('main-content').style.display = 'block';
    }

    // --- DATA WATCHERS ---
    onSnapshot(collection(db, "active_parking"), snap => {
        document.getElementById('table-dash').innerHTML = snap.docs.map(doc => {
            const r = doc.data(); return `<tr><td>${r.plate}</td><td>${r.entryTime}</td><td>PARKED</td><td>${r.date}</td><td><button class="btn-release" onclick="checkOut('${r.plate}')">RELEASE</button></td></tr>`;
        }).join('');
    });

    onSnapshot(collection(db, "parking_history"), snap => {
        document.getElementById('table-hist').innerHTML = snap.docs.map(doc => {
            const r = doc.data();
            const btn = currentUserRole === 'admin' ? `<td><button class="btn-delete" onclick="moveToArchive('parking_history', '${doc.id}')">Delete</button></td>` : "";
            return `<tr><td>${r.plate}</td><td>${r.entryTime}</td><td>${r.out}</td><td>${r.date}</td>${btn}</tr>`;
        }).reverse().join('');
    });

    onSnapshot(collection(db, "sales_report"), snap => {
        document.getElementById('table-sale').innerHTML = snap.docs.map(doc => {
            const r = doc.data();
            return `<tr><td>${r.plate}</td><td>P${r.pay}.00</td><td>${r.date}</td><td><button class="btn-delete" onclick="moveToArchive('sales_report', '${doc.id}')">Delete</button></td></tr>`;
        }).reverse().join('');
    });

    onSnapshot(collection(db, "archive"), snap => {
        document.getElementById('table-arch').innerHTML = snap.docs.map(doc => {
            const r = doc.data();
            return `<tr><td>${r.plate}</td><td>${r.originalCol}</td><td>${r.deletedAt}</td><td><button class="btn-restore" onclick="restoreFromArchive('${doc.id}')">Restore</button><button class="btn-delete" onclick="finalDelete('${doc.id}')">X</button></td></tr>`;
        }).reverse().join('');
    });

    window.finalDelete = async (id) => { if(confirm("Permanently delete?")) await deleteDoc(doc(db, "archive", id)); };
    window.clearCollection = async (col) => {
        const s = await getDocs(collection(db, col));
        const b = writeBatch(db); s.forEach(d => b.delete(d.ref)); await b.commit();
    };
    window.showTab = (id, el) => {
        document.querySelectorAll('.tab-view').forEach(v => v.style.display = 'none');
        document.getElementById(id).style.display = 'block';
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
    };
    window.filterTable = (id, q) => {
        const rows = document.querySelectorAll(`#${id} tr`);
        rows.forEach(r => r.style.display = r.innerText.toUpperCase().includes(q.toUpperCase()) ? "" : "none");
    };
    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleString(); }, 1000);
</script>
</body>
</html>
